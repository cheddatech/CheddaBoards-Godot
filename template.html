<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Change this to your game's name -->
  <title>My CheddaBoards Game</title>

  <!-- ============================================================
       CheddaBoards web export shell — v2
       ------------------------------------------------------------
       This file is ONLY a loading screen + the Godot engine
       bootstrap. Nothing else.

       In v2 the game talks to CheddaBoards from GDScript over the
       HTTP API, and signs players in with Device Code Auth — so the
       SDK, OAuth scripts, and the old JavaScript bridge are NOT
       needed here. If you find a big CONFIG block, a
       `cheddaboards_v1` CDN script, or `window.chedda_*` functions
       in a template.html, that's the legacy v1.x shell — this
       replaces it.
       ============================================================ -->

  <!-- Godot engine loader -->
  <script src="index.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #preload {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
      color: #FFD700;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    #preload.fade {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      animation: pulse 1.5s ease-in-out infinite;
    }

    #spin {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 215, 0, 0.2);
      border-top: 3px solid #FFD700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    canvas {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <!-- Loading screen -->
  <div id="preload">
    <div class="loading-text">Loading...</div>
    <div id="spin"></div>
  </div>

  <!-- Godot canvas -->
  <canvas id="canvas">Your browser doesn't support HTML5 canvas.</canvas>

  <script type="module">
    // Start the Godot engine once the page has loaded, then fade out
    // the loading screen. `executable: 'index'` means the export must
    // be named index.html (it loads index.js / index.pck / index.wasm).
    window.addEventListener('load', async () => {
      try {
        const engine = new Engine({
          canvasResizePolicy: 2,
          executable: 'index',
          fileSizes: { 'index.pck': 0, 'index.wasm': 0 },
          focusCanvas: true,
          canvas: document.getElementById('canvas')
        });

        await engine.startGame();

        setTimeout(() => {
          const preload = document.getElementById('preload');
          preload?.classList.add('fade');
          setTimeout(() => preload?.remove(), 500);
        }, 500);
      } catch (error) {
        console.error('[CheddaBoards] Failed to start game:', error);
        const t = document.querySelector('.loading-text');
        if (t) t.textContent = 'Error: ' + error.message;
      }
    });
  </script>
</body>
</html>
